<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西邮逸夫楼教室引导</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

   <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #EFF2FA;  /* 云朵色背景，与天空呼应 */
        }
        
        /* 卡片容器 - 与背景融合 */
        .app-container {
            width: 92%;
            max-width: 400px;
            min-height: calc(100vh - 20px);
            background-image: url('./images/yifu_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(239, 242, 250, 0.7);  /* 云朵色半透蒙版 */
            background-blend-mode: overlay;
            border-radius: 28px;
            padding: 30px 20px 40px 20px;
            margin: 10px auto;
            position: relative;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(18, 49, 88, 0.12);
            position: relative;  /* 确保这一行存在 */
        }
        
        .school-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 12px rgba(18, 49, 88, 0.15);
            z-index: 999;
            transition: all 0.25s ease;
            border: 2px solid rgba(52, 145, 207, 0.3);
        }
        .school-logo:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(18, 49, 88, 0.2);
        }
        .school-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .page {
            width: 100%;
            display: none;
            padding-top: 10px;
            animation: fadeIn 0.3s ease-out;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        /* 标题样式 */
        .page-title {
            text-align: center;
            margin-bottom: 21px;
            padding-top: 10px;
        }
        
        .page-title h1 {
            font-size: 27px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
            color: #123158;  /* 校徽深蓝 */
            font-family: "KaiTi", "STKaiti", serif;
        }
        
        .page-title h1:first-child {
            font-size: 25px;
            font-weight: 600;
            color: #7B5E66;  /* 大楼暖棕 */
        }
        #page1 .page-title p {
            font-size: 16px;      /* 改成你想要的字号 */
            font-weight: 500;     /* 加粗，600-700 都可以 */
            margin: 10 0 10px 0;
            padding-left: 10px;
            border-left: 3px solid #3491CF;
            line-height: 1.4;
            text-align: left;
            color:#7B5E66;  /* 大楼暖棕 */     /* 可选：改颜色 */
        }
        #page2 .page-title p {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
            color: #123158;
            padding-top: 36px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 3px solid #3491CF;  /* 天空蓝装饰线 */
            padding-left: 12px;
        }
        
        #page3 {
            padding-top: 65px !important;
        }
        
        .page-title p {
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            margin-top: 16px;
            color: #7B5E66;
        }
        
        /* 图标样式 */
        i {
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .page-title h1 i {
            color: #3491CF;  /* 天空蓝 */
            font-size: 1.1em;
        }
        
        .page-title p i {
            color: #7B5E66;
        }
        
        /* 下拉选择器 */
        .picker-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin: 16px 0 10px 0;
            gap: 10px;
        }
        
        .picker-column {
            flex: 1;
            height: 52px;
            position: relative;
            background: white;
            border: 1px solid #D4DCE8;
            border-radius: 14px;
            transition: all 0.2s ease;
        }
        
        .picker-column:focus-within {
            border-color: #3491CF;
            box-shadow: 0 0 0 3px rgba(52, 145, 207, 0.15);
        }
        
        .picker-label {
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 11px;
            font-weight: 500;
            z-index: 3;
            color: #7B5E66;
            background: white;
            padding: 0 6px;
            border-radius: 10px;
            pointer-events: none;
        }
        
        .picker-select {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            background: transparent;
            cursor: pointer;
            color: #123158;
            padding: 0 28px 0 12px;
            appearance: none;
            -webkit-appearance: none;
        }
        
        .picker-select option {
            color: #123158;
            font-size: 15px;
            padding: 8px;
        }
        
        .picker-select option:checked {
            color: #3491CF;
            font-weight: 600;
        }
        
        /* 下拉箭头 */
        .picker-column::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #7B5E66;
            pointer-events: none;
            transition: transform 0.2s linear;
        }
        
        .picker-select:focus ~ .picker-column::after,
        .picker-column:focus-within::after {
            transform: translateY(-50%) rotate(180deg);
        }
        
        .indoor-picker {
            margin-bottom: 0;
        }
        
        .indoor-picker .picker-column {
            background: white;
        }
        
        /* 单选按钮组 */
        .radio-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .radio-item {
            flex: 1;
            height: 48px;
            border: 1px solid #D4DCE8;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: white;
            transition: all 0.2s ease;
            color: #7B5E66;
        }
        
        .radio-item i {
            font-size: 1em;
            transition: all 0.2s ease;
        }
        
        .radio-item:hover {
            border-color: #3491CF;
            background: rgba(52, 145, 207, 0.05);
            transform: translateY(-1px);
        }
        
        .radio-item.active {
            background: #3491CF;  /* 天空蓝选中 */
            border-color: #3491CF;
            color: white;
            box-shadow: 0 4px 12px rgba(52, 145, 207, 0.25);
        }
        
        .radio-item.active i {
            color: white;
        }
        
        /* 按钮组 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }
        
        /* 主按钮 - 校徽深蓝 */
        .btn-primary {
            background: #123158;  /* 校徽深蓝 */
            color: white;
            box-shadow: 0 2px 8px rgba(18, 49, 88, 0.2);
        }
        
        .btn-primary i {
            color: white;
            transition: transform 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #1A4680;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(18, 49, 88, 0.25);
        }
        
        .btn-primary:hover i {
            transform: translateX(3px);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        /* 次按钮 - 暖棕边框 */
        .btn-secondary {
            background: white;
            color: #7B5E66;
            border: 1px solid #D4DCE8;
        }
        
        .btn-secondary i {
            color: #7B5E66;
            transition: all 0.2s ease;
        }
        
        .btn-secondary:hover {
            background: #F8F9FC;
            border-color: #3491CF;
            color: #3491CF;
            transform: translateY(-1px);
        }
        
        .btn-secondary:hover i {
            color: #3491CF;
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
        }
        
        /* 地图卡片 */
        .map-box {
            border-radius: 16px;
            margin: 16px 0;
            padding: 16px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
        }
        
        .map-box:hover {
            box-shadow: 0 4px 12px rgba(18, 49, 88, 0.08);
            transform: translateY(-1px);
        }
        
        .map-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: none;
            margin: 0 auto;
        }
        
        .map-placeholder {
            width: 100%;
            height: 170px;
            background: #F8F9FC;
            border: 1px dashed #D4DCE8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7B5E66;
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
        }
        
        .map-placeholder i {
            color: #3491CF;
            margin-right: 6px;
        }
        
        .map-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #123158;
            letter-spacing: 0.3px;
        }
        
        .map-title i {
            color: #3491CF;
            margin-right: 6px;
        }
        
        .position-info {
            font-size: 18px;
            font-weight: 600;
            margin: 12px 0 0;
            line-height: 1.4;
            color: #3491CF;  /* 天空蓝高亮 */
            padding: 8px 12px;
            background: rgba(52, 145, 207, 0.05);
            border-radius: 12px;
            text-align: center;
            animation: fadeInText 0.2s ease-out;
        }
        
        @keyframes fadeInText {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .position-info i {
            color: #3491CF;
        }
        
        .position-info span {
            color: #3491CF;
            font-weight: 700;
        }
        
        /* 路线结果 */
        .route-result {
            margin: 20px 0;
        }
        
        .route-result h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #123158;
            text-align: center;
            font-weight: 600;
        }
        
        .route-result h3 i {
            color: #3491CF;
        }
        
        .route-text {
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            background: white;
            color: #123158;
            animation: fadeInText 0.2s ease-out;
            border: 1px solid #E8EDF3;
        }
        
        .route-text .highlight {
            color: #3491CF;
            font-weight: 700;
            display: inline-block;
        }
        
        /* 辅助元素 */
        .tip-text {
            color: #7B5E66;
            font-size: 13px;
            margin: 8px 0;
        }
        
        .tip-text i {
            color: #3491CF;
        }
        .tip-text {
            color: #123158;       /* 改成深蓝色，更醒目 */
            font-size: 17px;      /* 更大字号 */
            font-weight: 600;     /* 加粗 */
            margin: 12px 0 27px 0;  /* 增加上下间距 */
            padding-left: 8px;    /* 左边留点空间 */
            border-left: 3px solid #3491CF;  /* 加蓝线装饰，和上面统一 */
        }
        
        .error-text {
            color: #3491CF;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            padding: 6px;
            border-radius: 10px;
            background: rgba(52, 145, 207, 0.05);
        }
        
        /* 加载动画 */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .btn-primary.loading i {
            animation: rotate 0.8s linear infinite;
        }
        
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }


/* 快捷操作栏 */
.quick-bar {
    display: flex;
    gap: 2px;
    margin-top: 5px;
    margin-bottom: 30px;
}

.btn-quick {
    flex: 1;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #3491CF;
    border-radius: 24px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 500;
    color: #3491CF;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.btn-quick:hover {
    background: #3491CF;
    color: white;
    transform: translateY(-1px);
}

/* 面板通用样式 */
.panel {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    margin-bottom: 16px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
    position: relative;
    z-index: 10;
}

.panel-header {
    padding: 12px 16px;
    background: #F8F9FC;
    font-size: 14px;
    font-weight: 600;
    color: #123158;
    border-bottom: 1px solid #E8EDF3;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.panel-header i {
    color: #3491CF;
    margin-right: 8px;
}

.panel-close {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
    padding: 0 4px;
    transition: color 0.2s;
}

.panel-close:hover {
    color: #e74c3c;
}

.panel-list {
    max-height: 350px;
    overflow-y: auto;
}

/* 历史记录列表项 */
.history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #E8EDF3;
    cursor: pointer;
    transition: background 0.2s ease;
}

.history-item:hover {
    background: #F0F7FF;
}

.history-info {
    flex: 1;
}

.history-code {
    font-size: 16px;
    font-weight: 600;
    color: #123158;
    margin-bottom: 4px;
}

.history-code i {
    color: #3491CF;
    margin-right: 6px;
}

.history-time {
    font-size: 11px;
    color: #999;
}

.history-delete {
    color: #ccc;
    cursor: pointer;
    padding: 6px;
    border-radius: 4px;
    transition: all 0.2s;
}

.history-delete:hover {
    color: #e74c3c;
    background: rgba(231, 76, 60, 0.1);
}

/* 常用教室列表项 */
.favorite-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #E8EDF3;
    cursor: pointer;
    transition: background 0.2s ease;
}

.favorite-item:hover {
    background: #F0F7FF;
}

.favorite-info {
    flex: 1;
}

.favorite-code {
    font-size: 16px;
    font-weight: 600;
    color: #123158;
    margin-bottom: 4px;
}

.favorite-code i {
    color: #FFB800;
    margin-right: 6px;
}

.favorite-detail {
    font-size: 12px;
    color: #7B5E66;
}

.favorite-delete {
    color: #ccc;
    cursor: pointer;
    padding: 6px;
    border-radius: 4px;
    transition: all 0.2s;
}

.favorite-delete:hover {
    color: #e74c3c;
    background: rgba(231, 76, 60, 0.1);
}

/* 添加常用按钮 */
.panel-footer {
    padding: 12px 16px;
    border-top: 1px solid #E8EDF3;
    background: #FAFCFE;
}

.btn-add-favorite {
    width: 100%;
    background: rgba(52, 145, 207, 0.1);
    border: 1px dashed #3491CF;
    border-radius: 12px;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #3491CF;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-add-favorite:hover {
    background: rgba(52, 145, 207, 0.2);
    transform: translateY(-1px);
}

.btn-add-favorite.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: #f5f5f5;
    color: #999;
    border-color: #ddd;
}

.btn-add-favorite.disabled:hover {
    transform: none;
    background: #f5f5f5;
}

/* 空状态 */
.panel-empty {
    padding: 32px;
    text-align: center;
    color: #999;
    font-size: 14px;
}

.panel-empty i {
    margin-right: 6px;
    color: #ccc;
}

/* 提示消息 */
.toast-message {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 1000;
    animation: fadeInOut 2s ease;
    pointer-events: none;
}

@keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}



------------icon自定义---------------
/* 自定义图标样式 - 天空蓝 + 垂直居中 */
.map-title img,
.position-info img {
    width: 1.4em;
    height: 1.4em;
    margin-right: 8px;
    vertical-align: middle;
    display: inline-block;
    /* 染成天空蓝 #3491CF */
    filter: brightness(0) saturate(100%) invert(47%) sepia(76%) saturate(1234%) hue-rotate(176deg) brightness(97%) contrast(94%);
}

/* 按钮组 - 三按钮布局 */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 0px;
}

.btn-group-row {
    display: flex;
    gap: 12px;
}

/* 第二页的三级选择器下边距 */
#室内-picker {
    margin-bottom: 0px !important;
}

--------结束动画---------------
/* 波纹扩散 - 多层渐变，更明显 */
@keyframes ripple {
    0% {
        transform: scale(0);
        opacity: 0.8;
        box-shadow: 0 0 0 0 rgba(52, 145, 207, 0.7);
    }
    50% {
        transform: scale(3);
        opacity: 0.5;
        box-shadow: 0 0 0 20px rgba(52, 145, 207, 0.3);
    }
    100% {
        transform: scale(6);
        opacity: 0;
        box-shadow: 0 0 0 40px rgba(52, 145, 207, 0);
    }
}

/* 心跳 */
@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* 文字从左边滑入 */
@keyframes slideInFromLeft {
    0% {
        opacity: 0;
        transform: translateX(-50px);
    }
    100% {
        opacity: 1;
        transform: translateX(0);
    }
}

/* 文字停留后淡出 */
@keyframes fadeUpStay {
    0% {
        opacity: 0;
        transform: translateY(20px);
    }
    20% {
        opacity: 1;
        transform: translateY(0);
    }
    80% {
        opacity: 1;
        transform: translateY(0);
    }
    100% {
        opacity: 0;
        transform: translateY(-10px);
    }
}
/* 只向上浮动 */
@keyframes gentleFloat {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-4.5px);
    }
    100% {
        transform: translateY(0px);
    }
}/* 光晕呼吸感 - 更深颜色 */
@keyframes breathGlow {
    0% {
        filter: drop-shadow(0 0 2px rgba(15, 108, 189, 0.4));
    }
    25% {
        filter: drop-shadow(0 0 8px rgba(15, 108, 189, 0.7));
    }
    50% {
        filter: drop-shadow(0 0 14px rgba(15, 108, 189, 0.9));
    }
    75% {
        filter: drop-shadow(0 0 8px rgba(15, 108, 189, 0.7));
    }
    100% {
        filter: drop-shadow(0 0 2px rgba(15, 108, 189, 0.4));
    }
}

/* 应用到图标 */
#current-position-text i,
#target-position-text img {
    display: inline-block;

--------------箭头效果---------

/* 选中所有向下的箭头 */
.route-text {
    font-size: 14px;
}
/* 直接给 ↓ 符号加样式 */
.route-text {
    position: relative;
}

.route-text span:contains('↓') {
    display: inline-block;
    animation: glowPulse 0.8s ease-in-out infinite;
}

/* 用属性选择器，匹配所有包含 ↓ 的元素 */
*:has(> .route-text) {
    /* 这个不用管 */
}

/* 最终方案：用伪元素覆盖箭头 */
.route-text {
    position: relative;
}
/* 箭头加粗 */
.route-text br + span {
    display: inline-block;
    font-weight: 550;
    font-size: 1.2em;
    color: #3491CF;
    animation: flowGlowIntense 1.5s linear infinite;
}

@keyframes bounceAndPulse {
    0% {
        transform: translateY(0px);
        text-shadow: 
            0 0 2px rgba(52, 145, 207, 0.3),
            0 0 4px rgba(52, 145, 207, 0.2);
    }
    25% {
        transform: translateY(-2px);
        text-shadow: 
            0 0 8px rgba(52, 145, 207, 0.7),
            0 0 12px rgba(52, 145, 207, 0.5);
    }
    50% {
        transform: translateY(-4px);
        text-shadow: 
            0 0 16px rgba(52, 145, 207, 1),
            0 0 24px rgba(52, 145, 207, 0.8);
    }
    75% {
        transform: translateY(-2px);
        text-shadow: 
            0 0 10px rgba(52, 145, 207, 0.7),
            0 0 16px rgba(52, 145, 207, 0.5);
    }
    100% {
        transform: translateY(0px);
        text-shadow: 
            0 0 2px rgba(52, 145, 207, 0.3),
            0 0 4px rgba(52, 145, 207, 0.2);
    }
}

.route-text br + span {
    display: inline-block;
    font-weight: 900;
    font-size: 1.3em;
    color: #3491CF;
    animation: bounceAndPulse 1.2s ease-in-out infinite;
}.highlight {
    animation: none !important;
    /* 保留原有样式，不加动态阴影 */
}

               const sections = classroomConfig[type][numFirst] || [];
               const section = sections.find(s => num >= s.start && num <= s.end);
               if (!section) return null;

// ==================== 历史记录功能 ====================

const MAX_HISTORY = 8;
const MAX_FAVORITES = 5;
const HISTORY_KEY = 'yifu_history';
const FAVORITES_KEY = 'yifu_favorites';

// 获取历史记录
function getHistory() {
    const history = localStorage.getItem(HISTORY_KEY);
    return history ? JSON.parse(history) : [];
}

// 保存历史记录
function saveHistory(history) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

// 添加历史记录（先入先出）
function addToHistory(targetClassroom) {
    if (!targetClassroom) return;
    
    const history = getHistory();
    const newRecord = {
        code: targetClassroom.code,
        type: targetClassroom.type,
        floor: targetClassroom.originalFloor || targetClassroom.realFloor,
        time: new Date().toLocaleString(),
        timestamp: Date.now()
    };
    
    // 移除重复记录
    const filtered = history.filter(item => item.code !== newRecord.code);
    
    // 添加到开头
    filtered.unshift(newRecord);
    
    // 限制数量（先入先出）
    const limited = filtered.slice(0, MAX_HISTORY);
    
    saveHistory(limited);
    renderHistoryList();
}

// 删除历史记录
function deleteHistoryItem(index) {
    const history = getHistory();
    history.splice(index, 1);
    saveHistory(history);
    renderHistoryList();
}

// ==================== 常用教室功能 ====================

// 获取常用教室
function getFavorites() {
    const favorites = localStorage.getItem(FAVORITES_KEY);
    return favorites ? JSON.parse(favorites) : [];
}

// 保存常用教室
function saveFavorites(favorites) {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
}

// 添加常用教室
function addToFavorites(targetClassroom) {
    if (!targetClassroom) return;
    
    const favorites = getFavorites();
    
    // 检查是否已存在
    if (favorites.some(f => f.code === targetClassroom.code)) {
        showToast('该教室已在常用列表中');
        return false;
    }
    
    // 检查数量限制
    if (favorites.length >= MAX_FAVORITES) {
        showToast(`最多只能添加 ${MAX_FAVORITES} 个常用教室，请先删除再添加`);
        return false;
    }
    
    const newFavorite = {
        code: targetClassroom.code,
        type: targetClassroom.type,
        floor: targetClassroom.originalFloor || targetClassroom.realFloor,
        addedTime: new Date().toLocaleString()
    };
    
    favorites.push(newFavorite);
    saveFavorites(favorites);
    renderFavoriteList();
    showToast(`已添加 ${targetClassroom.code} 到常用教室`);
    return true;
}

// 删除常用教室
function deleteFavoriteItem(index) {
    const favorites = getFavorites();
    const removed = favorites[index];
    favorites.splice(index, 1);
    saveFavorites(favorites);
    renderFavoriteList();
    showToast(`已删除 ${removed.code}`);
}

// 显示提示消息
function showToast(message) {
    // 移除已有的toast
    const existingToast = document.querySelector('.toast-message');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 2000);
}

// ==================== 渲染函数 ====================

// 渲染历史记录列表
function renderHistoryList() {
    const history = getHistory();
    const historyList = document.getElementById('historyList');
    
    if (!historyList) return;
    
    if (history.length === 0) {
        historyList.innerHTML = '<p class="panel-empty"><i class="fas fa-inbox"></i> 暂无历史记录</p>';
        return;
    }
    
    historyList.innerHTML = history.map((item, index) => `
        <div class="history-item" data-code="${item.code}" data-type="${item.type}" data-floor="${item.floor}">
            <div class="history-info">
                <div class="history-code">
                    <i class="fas fa-chalkboard"></i> ${item.code}
                </div>
                <div class="history-time">
                    <i class="fas fa-clock"></i> ${item.time}
                </div>
            </div>
            <div class="history-delete" data-index="${index}">
                <i class="fas fa-trash-alt"></i>
            </div>
        </div>
    `).join('');
    
    // 绑定点击事件
    document.querySelectorAll('.history-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (e.target.closest('.history-delete')) return;
            selectAndGoToNext(item.dataset);
        });
    });
    
    // 绑定删除按钮
    document.querySelectorAll('.history-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const index = parseInt(btn.dataset.index);
            deleteHistoryItem(index);
        });
    });
}

// 渲染常用教室列表
function renderFavoriteList() {
    const favorites = getFavorites();
    const favoriteList = document.getElementById('favoriteList');
    const addBtn = document.getElementById('addFavoriteBtn');
    
    if (!favoriteList) return;
    
    if (favorites.length === 0) {
        favoriteList.innerHTML = '<p class="panel-empty"><i class="fas fa-star"></i> 点击下方按钮添加常用教室</p>';
    } else {
        favoriteList.innerHTML = favorites.map((item, index) => `
            <div class="favorite-item" data-code="${item.code}" data-type="${item.type}" data-floor="${item.floor}">
                <div class="favorite-info">
                    <div class="favorite-code">
                        <i class="fas fa-star"></i> ${item.code}
                    </div>
                    <div class="favorite-detail">
                        <i class="fas fa-layer-group"></i> ${item.floor}楼 · 
                        ${item.type === 'FZ' ? '普通教室' : '阶梯教室'}
                    </div>
                </div>
                <div class="favorite-delete" data-index="${index}">
                    <i class="fas fa-trash-alt"></i>
                </div>
            </div>
        `).join('');
    }
    
    // 绑定常用教室点击事件
    document.querySelectorAll('.favorite-item').forEach(item => {
        item.addEventListener('click', (e) => {
            if (e.target.closest('.favorite-delete')) return;
            selectAndGoToNext(item.dataset);
        });
    });
    
    // 绑定删除按钮
    document.querySelectorAll('.favorite-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const index = parseInt(btn.dataset.index);
            deleteFavoriteItem(index);
        });
    });
    
    // 更新添加按钮状态
    if (addBtn) {
        if (favorites.length >= MAX_FAVORITES) {
            addBtn.classList.add('disabled');
            addBtn.innerHTML = `<i class="fas fa-ban"></i> 已达上限 (${MAX_FAVORITES}/${MAX_FAVORITES})`;
        } else {
            addBtn.classList.remove('disabled');
            addBtn.innerHTML = `<i class="fas fa-plus"></i> 添加当前教室为常用 (${favorites.length}/${MAX_FAVORITES})`;
        }
    }
}

// 选择记录并跳转
function selectAndGoToNext(data) {
    const targetType = document.getElementById('target-type');
    const targetFloor = document.getElementById('target-floor');
    const targetNum = document.getElementById('target-num');
    
    const code = data.code;
    const type = data.type;
    const floor = data.floor;
    const num = code.slice(-2);
    
    targetType.value = type;
    targetFloor.value = floor;
    
    generateClassroomNumbers(targetType, targetFloor, targetNum);
    
    for (let i = 0; i < targetNum.options.length; i++) {
        if (targetNum.options[i].value === num) {
            targetNum.selectedIndex = i;
            break;
        }
    }
    
    // 关闭面板
    document.getElementById('historyPanel').style.display = 'none';
    document.getElementById('favoritePanel').style.display = 'none';
    
    setTimeout(() => {
        document.getElementById('page1-next').click();
    }, 100);
}

// 初始化面板
function initPanels() {
    const historyBtn = document.getElementById('historyBtn');
    const favoriteBtn = document.getElementById('favoriteBtn');
    const historyPanel = document.getElementById('historyPanel');
    const favoritePanel = document.getElementById('favoritePanel');
    const closeHistory = document.getElementById('closeHistoryBtn');
    const closeFavorite = document.getElementById('closeFavoriteBtn');
    const addFavoriteBtn = document.getElementById('addFavoriteBtn');
    
    if (historyBtn) {
        historyBtn.addEventListener('click', () => {
            favoritePanel.style.display = 'none';
            renderHistoryList();
            historyPanel.style.display = historyPanel.style.display === 'none' ? 'block' : 'none';
        });
    }
    
    if (favoriteBtn) {
        favoriteBtn.addEventListener('click', () => {
            historyPanel.style.display = 'none';
            renderFavoriteList();
            favoritePanel.style.display = favoritePanel.style.display === 'none' ? 'block' : 'none';
        });
    }
    
    if (closeHistory) {
        closeHistory.addEventListener('click', () => {
            historyPanel.style.display = 'none';
        });
    }
    
    if (closeFavorite) {
        closeFavorite.addEventListener('click', () => {
            favoritePanel.style.display = 'none';
        });
    }
    
    if (addFavoriteBtn) {
        addFavoriteBtn.addEventListener('click', () => {
            const favorites = getFavorites();
            if (favorites.length >= MAX_FAVORITES) {
                showToast(`最多只能添加 ${MAX_FAVORITES} 个常用教室`);
                return;
            }
            
            const type = document.getElementById('target-type').value;
            const first = document.getElementById('target-floor').value;
            const num = document.getElementById('target-num').value;
            const tempTarget = getClassroomInfo(type, first, num);
            
            if (tempTarget) {
                addToFavorites(tempTarget);
            } else {
                showToast('请先选择有效的教室');
            }
        });
    }
    
    // 点击其他地方关闭面板
    document.addEventListener('click', (e) => {
        if (!historyBtn?.contains(e.target) && !historyPanel?.contains(e.target)) {
            if (historyPanel) historyPanel.style.display = 'none';
        }
        if (!favoriteBtn?.contains(e.target) && !favoritePanel?.contains(e.target)) {
            if (favoritePanel) favoritePanel.style.display = 'none';
        }
    });
}

//---------箭头------------
function startArrowFlow() {
        const arrows = document.querySelectorAll('.arrow');
        if (arrows.length === 0) return;
        
        let step = 0;
        setInterval(() => {
            step = (step + 1) % 4;
            let offset = 0;
            if (step === 1) offset = 3;
            else if (step === 2) offset = 6;
            else if (step === 3) offset = 3;
            
            arrows.forEach(arrow => {
                arrow.style.transform = `translateY(${offset}px)`;
            });
        }, 300);
    }
    
    startArrowFlow();
